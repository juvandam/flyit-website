<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo blanco -->
  <rect width="200" height="200" fill="white"/>
  <!-- Icono del avión simplificado -->
  <g transform="translate(100, 100)">
    <!-- Fuselaje (cuerpo del avión) -->
    <ellipse cx="0" cy="0" rx="15" ry="50" fill="black"/>
    <!-- Alas -->
    <path d="M -15 -5 L -70 15 L -15 5 Z" fill="black"/>
    <path d="M 15 -5 L 70 15 L 15 5 Z" fill="black"/>
    <!-- Cola -->
    <path d="M -8 45 L -25 65 L 0 50 Z" fill="black"/>
    <path d="M 8 45 L 25 65 L 0 50 Z" fill="black"/>
    <!-- Línea blanca decorativa (característica del logo) -->
    <path d="M -10 -10 Q 0 5 10 15" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>